<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>野生菌新客户成交话术卡｜多产品极简最终版</title>
  <style>
    :root{--bg:#f3f6f4;--card:#fff;--text:#17231e;--muted:#66726c;--line:#d9e2dd;--main:#17684f;--soft:#e9f3ef;--hit:#fff0ad;--shadow:0 4px 16px rgba(25,50,40,.07)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}button{touch-action:manipulation}.shell{width:min(980px,100%);margin:auto;padding:18px 14px 52px}.brand{font-size:25px;line-height:1.2;margin:0 0 4px;font-weight:800}.sub{margin:0 0 15px;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);margin:12px 0;overflow:hidden}.module-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 16px}.module-title{margin:0;font-size:20px;font-weight:800}.toggle{border:0;border-radius:7px;background:var(--soft);color:var(--main);font-weight:750;min-height:42px;padding:8px 13px;cursor:pointer}.module-body{padding:0 16px 16px}.collapsed>.module-body{display:none}.collapsed>.module-head{padding-block:11px}.collapsed>.module-head .module-title{font-size:18px}
    .opening{border-top:5px solid var(--main)}.opening .module-body{padding-top:0}.primary{border:0;border-radius:7px;background:var(--main);color:#fff;font-weight:800;min-height:46px;padding:10px 16px;cursor:pointer;margin-bottom:12px}
    .lines{display:grid;gap:9px}.line{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:11px 10px 11px 13px;transition:background .2s,border-color .2s}.line-text{flex:1;white-space:pre-line}.copy{flex:0 0 auto;border:0;border-radius:7px;background:var(--main);color:#fff;font-weight:750;min-width:64px;min-height:42px;padding:8px 11px;cursor:pointer}.line.flash{background:var(--hit);border-color:#e6c44e}
    .search{width:100%;border:1px solid #bac8c1;border-radius:8px;background:#fff;padding:13px 14px;font-size:17px;outline:none;margin:2px 0 7px}.search:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(23,104,79,.12)}
    .types{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-bottom:12px}.type-btn{border:1px solid #bac8c1;border-radius:7px;background:#fff;color:var(--text);font-weight:800;min-height:56px;padding:9px;cursor:pointer}.type-btn.active{background:var(--main);border-color:var(--main);color:#fff}.type-card{display:none;border-top:1px solid var(--line);padding-top:13px}.type-card.open{display:block}.type-card h3{margin:0 0 10px;font-size:18px}
    .qa-wrap{display:grid;gap:10px}.subcard{border:1px solid var(--line);border-radius:8px;background:#fbfcfb;overflow:hidden}.subhead{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;border:0;background:transparent;padding:13px 14px;text-align:left;cursor:pointer}.subhead strong{font-size:18px}.subtoggle{color:var(--main);font-weight:750}.subbody{padding:0 13px 13px}.subcard.collapsed .subbody{display:none}
    .anchors{display:flex;gap:8px;overflow:auto;padding:2px 0 5px}.anchors button{flex:0 0 auto;border:1px solid #c8d7d0;border-radius:7px;background:var(--soft);color:#174d3c;font-weight:750;padding:9px 12px;cursor:pointer}.empty{display:none;text-align:center;color:var(--muted);background:#fff;border:1px dashed #b9c7c0;border-radius:8px;padding:20px;margin:12px 0}.hidden{display:none!important}footer{text-align:center;color:var(--muted);font-size:13px;margin-top:22px}
    @media(max-width:650px){.shell{padding:14px 11px 44px}.brand{font-size:22px}.module-head{padding:14px}.module-title{font-size:18px}.module-body{padding:0 13px 13px}.types{grid-template-columns:1fr}.line{align-items:flex-start}.line-text{font-size:16px}.copy{min-width:62px}.primary{width:100%}.subhead strong{font-size:17px}}
  </style>
</head>
<body>
  <main class="shell">
    <header><h1 class="brand">野生菌新客户成交话术卡｜多产品极简最终版</h1><p class="sub">客服复制工作台</p></header>
    <div class="anchors"><button type="button" data-jump="opening">开场</button><button type="button" data-jump="customers">客户类型</button><button type="button" data-jump="qa">高频Q&amp;A</button></div>

    <section class="card opening" id="opening">
      <div class="module-head"><h2 class="module-title">① 新客统一先发</h2><button class="toggle" type="button">收起</button></div>
      <div class="module-body"><button class="primary" id="copyOpening" type="button">一键复制开场三句</button><div class="lines" id="openingLines"></div></div>
    </section>

    <input class="search" id="search" type="search" placeholder="搜索：保存 / 优惠 / 红葱 / 定制 / 加热" autocomplete="off">

    <section class="card" id="customers">
      <div class="module-head"><h2 class="module-title">② 客户回复后，按情况复制</h2><button class="toggle" type="button">收起</button></div>
      <div class="module-body"><div class="types" id="typeButtons"></div><div id="typeCards"></div></div>
    </section>

    <section class="card" id="qa">
      <div class="module-head"><h2 class="module-title">③ 高频Q&amp;A</h2><button class="toggle" type="button">收起</button></div>
      <div class="module-body"><div class="qa-wrap" id="qaGroups"></div></div>
    </section>

    <div class="empty" id="empty">没有找到相关话术</div>
    <footer>内容同步自：01_新客话术卡_话术母版.md</footer>
  </main>

  <script>
    const data={
      opening:[
        `朋友！！你好呀`,
        `你是云南人不～吃过见手青嘛？`,
        `需要我根据您的情况给您推荐不～还是您有想吃的野生菌呀？`
      ],
      customers:[
        {key:'A',title:'A. 云南人',lines:[
          `那就不用我多介绍了哈哈哈！吃见手青就得吃楚雄的。好多老顾客说，我们家的白葱炒得比饭店都好吃，一定要试试，是我们家的招牌`,
          `好多云南人朋友也找我买，因为自己懒得洗，也怕炒不好就浪费了。特别是干巴菌，每次洗都得洗到凌晨，但是又得当天洗完处理完`,
          `我们家炒菌子炒了七年了，做的都是老顾客回头的生意，货真价实、薄利多销，您尝一次就知道了，嘴巴不会骗人的`,
          `送人的话，白见手和干巴菌更稳一点。安全、不会闹翻掉，而且买回去热一下就能吃，超级方便。`
        ]},
        {key:'B',title:'B. 外地没吃过',lines:[
          `我们家见手青主要是有\n1️⃣红见手青，就是会见小人人的那种\n2️⃣白见手青～吃了不会见小人人的安全版见手青`,
          `你要是没吃过见手青，那我建议你先从“白见手青”开始哈～它不像红见手那么猛，但是也超级香，一入口香气就在嘴巴里炸开，我超爱吃的`,
          `我们家的三大招牌：白见手口感香、滑、鲜，我拌饭都能吃三碗！干巴菌想吃香一点的话一定要冲，云南人心目中的菌王，炒饭界的天花板，最难捡也是最好吃的！鸡枞油拿来拌饭超级香，比肉还香，要等过段时间才出。`,
          `我们这边是大厨炒熟了再发的，你收到后直接放锅里一热，加点蒜+小米辣，就能出锅！`
        ]},
        {key:'C',title:'C. 外地人吃过',lines:[
          `我们有好多外地朋友吃不上正宗的云南菌子都找我们买，也怕自己不会炒浪费了`,
          `我们家主打一个货真价实，薄利多销，菌子都是我哥一个山头一个山头去收回来的`,
          `您吃过的话，一定要尝尝我们家的白见手，好多老顾客说比云南餐馆炒得还好吃`,
          `干巴菌是云南人心目中的菌王，炒饭界的天花板，最难捡也是最好吃的菌子`,
          `白见手、干巴菌、鸡枞油都适合家里吃，拌饭、吃米线都方便。早上拌饭，拌米线，拌面条，煮点小青菜拌一下都巨香。`
        ]}
      ],
      qa:[
        {title:'买红葱 / 想定制',lines:[
          `如果是不吃辣、不吃蒜、不吃猪油，或者有其他别的要求，今年可以做单独定制了，但是要10袋起，每袋300g，师傅单独开小灶炒一小锅。`,
          `红葱可以安排，但今年不零售散卖，最少5份起。因为好多外地朋友就是好奇想试试买一两包，如果没经验没热透的话，闹翻了就麻烦了，所以不太建议外地朋友因为好奇买红葱`
        ]},
        {title:'分量/ 性价比',lines:[
          `炒菌都是300g一袋，真空包装，是实打实的成品分量，我们家从来不掺杂菌、或者边角料，吃菌子就是纯纯吃菌子、只放了一点蒜片和辣子调味`,
          `野生菌本身损耗和丢头就大、炒了以后还会再缩水，一公斤菌子洗好炒好也就只剩个四五两。而且最费工费时的是洗菌子处理菌子，特别是洗干巴菌、一洗一个不吱声`,
          `外面干巴菌盖饭都卖到150一碗了，你在我这拿一盒怕是能炒三碗出来！  我真的建议你试试，吃完你就知道这300g是有多扎实`
        ]},
        {title:'安全/售后',lines:[
          `哈哈这个问题90%的人都会问，白见手是安全的，红见手有毒，干巴菌生吃都是可以的。我们家的炒菌子都是大师傅炒熟了再发的，您收到后热透了就能吃。`,
          `我们家是每天现炒现发的，今天下单炒好，等晾凉了以后急冻起来，48小时内顺丰冷链发货。一般是发货后1-2天到，偏远地区3天。`,
          `稍等我会发食用指南给您，按指南操作就行。等菌子到了一定要放进冰冻哈～不是放冷藏`,
          `一定得用锅加热，不要用微波炉加热。如果实在担心，可以吃之前喝一点牛奶～`,
          `您收到后尝尝鲜，喜欢吃的话跟我说一声。欢迎推荐新朋友来加我微信买菌子，我给你们发优惠券`
        ]},
        {title:'价格/优惠',lines:[
          `可以先来一两份试试，不用买太多，好吃了再来。任意2袋包邮比较划算，一件的话还得付邮费`,
          `现在优惠活动是任意2袋包邮，满500-40，满1000-100。红葱和私人订制不参与满减`,
          `满500-40，这个是我家最多顾客选的了，2袋干巴菌搭1袋白葱就到500了。`,
          `今年菌子基本就这个价格了，现在是菌子最多最好的时候，到9月份开始落潮，好多老顾客都已经开始囤货了`
        ]}
      ]
    };

    const $=s=>document.querySelector(s);
    function makeLine(text){const row=document.createElement('div');row.className='line searchable';row.dataset.text=text.toLowerCase();const content=document.createElement('div');content.className='line-text';content.textContent=text;const btn=document.createElement('button');btn.type='button';btn.className='copy';btn.textContent='复制';btn.addEventListener('click',()=>copyText(text,btn,row));row.append(content,btn);return row}
    async function copyText(text,btn,row,collapse){try{await navigator.clipboard.writeText(text);btn.textContent='已复制';row.classList.add('flash');setTimeout(()=>{btn.textContent=btn.id==='copyOpening'?'一键复制开场三句':'复制';row.classList.remove('flash');if(collapse)collapseModule($('#opening'))},1000)}catch(e){alert('请手动长按复制')}}
    function collapseModule(module){module.classList.add('collapsed');module.querySelector(':scope > .module-head .toggle').textContent='展开'}
    function toggleModule(module){module.classList.toggle('collapsed');module.querySelector(':scope > .module-head .toggle').textContent=module.classList.contains('collapsed')?'展开':'收起'}

    data.opening.forEach(x=>$('#openingLines').append(makeLine(x)));
    $('#copyOpening').addEventListener('click',e=>copyText(data.opening.join('\n'),e.currentTarget,$('#opening'),true));
    document.querySelectorAll('.card>.module-head>.toggle').forEach(btn=>btn.addEventListener('click',()=>toggleModule(btn.closest('.card'))));

    data.customers.forEach(c=>{const btn=document.createElement('button');btn.type='button';btn.className='type-btn';btn.textContent=c.title;btn.dataset.key=c.key;$('#typeButtons').append(btn);const card=document.createElement('section');card.className='type-card searchable-block';card.id='type-'+c.key;card.dataset.text=(c.title+' '+c.lines.join(' ')).toLowerCase();const h=document.createElement('h3');h.textContent=c.title;const lines=document.createElement('div');lines.className='lines';c.lines.forEach(x=>lines.append(makeLine(x)));card.append(h,lines);$('#typeCards').append(card);btn.addEventListener('click',()=>{collapseModule($('#opening'));$('#customers').classList.remove('collapsed');$('#customers .toggle').textContent='收起';document.querySelectorAll('.type-btn').forEach(x=>x.classList.toggle('active',x.dataset.key===c.key));document.querySelectorAll('.type-card').forEach(x=>x.classList.toggle('open',x.id==='type-'+c.key));setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),20)})});

    data.qa.forEach(g=>{const card=document.createElement('section');card.className='subcard searchable-block';card.dataset.text=(g.title+' '+g.lines.join(' ')).toLowerCase();const head=document.createElement('button');head.type='button';head.className='subhead';const title=document.createElement('strong');title.textContent=g.title;const toggle=document.createElement('span');toggle.className='subtoggle';toggle.textContent='收起';head.append(title,toggle);const body=document.createElement('div');body.className='subbody';const lines=document.createElement('div');lines.className='lines';g.lines.forEach(x=>lines.append(makeLine(x)));body.append(lines);card.append(head,body);head.addEventListener('click',()=>{card.classList.toggle('collapsed');toggle.textContent=card.classList.contains('collapsed')?'展开':'收起';collapseModule($('#opening'))});$('#qaGroups').append(card)});

    document.querySelectorAll('[data-jump]').forEach(btn=>btn.addEventListener('click',()=>{collapseModule($('#opening'));const target=document.getElementById(btn.dataset.jump);target.classList.remove('collapsed');const t=target.querySelector(':scope > .module-head .toggle');if(t)t.textContent='收起';target.scrollIntoView({behavior:'smooth',block:'start'})}));

    $('#search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();let found=0;document.querySelectorAll('.searchable').forEach(el=>{const hit=!q||el.dataset.text.includes(q);el.classList.toggle('hidden',!hit);if(q&&hit)found++});document.querySelectorAll('.searchable-block').forEach(el=>{const hit=!q||el.dataset.text.includes(q);el.classList.toggle('hidden',!hit);if(q&&hit){el.classList.remove('collapsed');const s=el.querySelector('.subtoggle');if(s)s.textContent='收起';const parent=el.closest('.card');if(parent){parent.classList.remove('collapsed');parent.querySelector(':scope > .module-head .toggle').textContent='收起'}if(el.classList.contains('type-card'))el.classList.add('open')}});$('#empty').style.display=q&&!found?'block':'none'});
  </script>
</body>
</html>
