<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">

  <style>
    :root{--bg:#f4f7f5;--card:#fff;--text:#17231e;--muted:#65736c;--line:#d7e1dc;--main:#17684f;--soft:#e7f2ec;--hit:#fff1a8;--shadow:0 3px 12px rgba(25,50,40,.06)}
    *{box-sizing:border-box}html{overflow-x:hidden}body{margin:0;overflow-x:hidden;background:var(--bg);color:var(--text);font:15.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}button,input{font:inherit}button{touch-action:manipulation;cursor:pointer}
    .shell{max-width:1180px;margin:auto;padding:7px 9px 30px}.brand{font-size:16px;line-height:1.15;margin:0 0 5px;font-weight:850}
    .search{width:100%;border:1px solid #b8c7c0;border-radius:8px;background:#fff;padding:7px 9px;font-size:14.5px;outline:none;margin:4px 0 1px}.search:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(23,104,79,.12)}
    .section{margin-top:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;box-shadow:var(--shadow);overflow:hidden}.section-head{position:relative;display:flex;align-items:center;justify-content:center;min-height:48px;padding:9px 42px;background:var(--soft);border-bottom:1px solid var(--line);cursor:pointer;user-select:none}.section-head:hover{background:#deede5}.section-title{margin:0;text-align:center;font-size:21px;line-height:1.25;font-weight:900;word-spacing:.45em}.section-head .chev{position:absolute;right:14px;color:var(--main);font-size:20px;font-weight:900}.section-body{padding:8px}.section.collapsed>.section-body{display:none}.section.collapsed>.section-head{border-bottom:0}
    .groups{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.section:nth-of-type(1) .groups,.section:nth-of-type(2) .groups{grid-template-columns:1fr}
    .subcard{background:#fbfcfb;border:1px solid var(--line);border-radius:8px;overflow:hidden;min-width:0}.subhead{position:relative;display:flex;align-items:center;justify-content:center;min-height:42px;padding:8px 36px;background:#fff;cursor:pointer;user-select:none}.subhead:hover{background:#f2f7f4}.subhead h3{font-size:16.5px;line-height:1.25;text-align:center;margin:0;font-weight:850}.subhead .chev{position:absolute;right:11px;color:var(--main);font-size:17px;font-weight:850}.subbody{padding:7px;border-top:1px solid var(--line)}.subcard.collapsed .subbody{display:none}
    .lines{display:grid;gap:6px}.line{display:flex;align-items:flex-start;gap:7px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:7px 7px 7px 9px;transition:background .2s,border-color .2s}.line-text{flex:1;white-space:pre-line;overflow-wrap:anywhere;word-break:break-word;min-width:0}.copy{flex:0 0 auto;border:0;border-radius:7px;background:var(--main);color:#fff;font-weight:800;min-width:46px;min-height:31px;padding:4px 8px;font-size:13.5px}.line.flash{background:var(--hit);border-color:#dfbf32}
    .empty{display:none;text-align:center;color:var(--muted);background:#fff;border:1px dashed #b9c7c0;border-radius:9px;padding:16px;margin:10px 0}.hidden{display:none!important}
    @media(max-width:900px){.groups{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:650px){body{font-size:14.5px}.shell{padding:6px 7px 24px}.brand{font-size:15.5px}.section{margin-top:7px}.section-head{min-height:44px;padding:8px 38px}.section-title{font-size:19px}.section-body{padding:7px}.groups{grid-template-columns:1fr;gap:6px}.subhead{min-height:40px;padding:7px 34px}.subhead h3{font-size:15.5px}.line{padding:6px 6px 6px 8px}.copy{min-width:45px;min-height:30px}}
  </style>
</head>
<body>

    const $=s=>document.querySelector(s);const $$=s=>Array.from(document.querySelectorAll(s));
    async function copyText(text,btn,row){try{await navigator.clipboard.writeText(text);btn.textContent='已复制';row.classList.add('flash');setTimeout(()=>{btn.textContent='复制';row.classList.remove('flash')},1000)}catch(e){alert('请手动长按复制')}}
    function makeLine(text){const row=document.createElement('div');row.className='line searchable';row.dataset.text=text.toLowerCase();const content=document.createElement('div');content.className='line-text';content.textContent=text;const btn=document.createElement('button');btn.type='button';btn.className='copy';btn.textContent='复制';btn.addEventListener('click',e=>{e.stopPropagation();copyText(text,btn,row)});row.append(content,btn);return row}
    function bindToggle(head,container,bodyClass){const arrow=head.querySelector('.chev');const set=collapsed=>{container.classList.toggle('collapsed',collapsed);arrow.textContent=collapsed?'›':'⌄'};head.addEventListener('click',()=>set(!container.classList.contains('collapsed')));head.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();set(!container.classList.contains('collapsed'))}});container._collapse=()=>set(true);container._expand=()=>set(false)}
    function makeGroup(group){const card=document.createElement('section');card.className='subcard group-card collapsed';card.dataset.text=[group.title,...group.lines].join(' ').toLowerCase();const head=document.createElement('div');head.className='subhead';head.setAttribute('role','button');head.tabIndex=0;const h=document.createElement('h3');h.textContent=group.title;const arrow=document.createElement('span');arrow.className='chev';arrow.textContent='›';head.append(h,arrow);const body=document.createElement('div');body.className='subbody';const lines=document.createElement('div');lines.className='lines';group.lines.forEach(line=>lines.append(makeLine(line)));body.append(lines);card.append(head,body);bindToggle(head,card,'subbody');return card}
    function makeSection(section,index){const box=document.createElement('section');box.className='section';box.dataset.text=[section.title,...section.groups.flatMap(g=>[g.title,...g.lines])].join(' ').toLowerCase();const head=document.createElement('div');head.className='section-head';head.setAttribute('role','button');head.tabIndex=0;const h=document.createElement('h2');h.className='section-title';h.textContent=section.title;const arrow=document.createElement('span');arrow.className='chev';arrow.textContent='⌄';head.append(h,arrow);const body=document.createElement('div');body.className='section-body';if(index<2){box.classList.add('direct-section');const lines=document.createElement('div');lines.className='lines';section.groups.flatMap(group=>group.lines).forEach(line=>lines.append(makeLine(line)));body.append(lines)}else{const groups=document.createElement('div');groups.className='groups';section.groups.forEach(group=>groups.append(makeGroup(group)));body.append(groups)}box.append(head,body);bindToggle(head,box,'section-body');return box}
    function defaultState(){$$('.section').forEach(x=>x._expand());$$('.group-card').forEach(x=>x._collapse());$$('.section,.group-card,.searchable').forEach(x=>x.classList.remove('hidden'));$('#empty').style.display='none'}
    function search(query){const q=query.trim().toLowerCase();if(!q){defaultState();return}let found=0;$$('.section').forEach(section=>{let sectionHit=false;if(section.classList.contains('direct-section')){section.querySelectorAll('.searchable').forEach(line=>{const hit=line.dataset.text.includes(q);line.classList.toggle('hidden',!hit);if(hit){sectionHit=true;found++}})}else{section.querySelectorAll('.group-card').forEach(group=>{const hit=group.dataset.text.includes(q);group.classList.toggle('hidden',!hit);if(hit){group._expand();sectionHit=true;found++}})}section.classList.toggle('hidden',!sectionHit);if(sectionHit)section._expand()});$('#empty').style.display=found?'none':'block'}
    data.sections.forEach((section,index)=>$('#sections').append(makeSection(section,index)));
    defaultState();$('#search').addEventListener('input',e=>search(e.target.value));

</html>
