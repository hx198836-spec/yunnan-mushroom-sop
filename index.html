<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#136b50">
  <title>新客话术卡</title>
  <style>
    :root{--bg:#f3f6f4;--card:#fff;--text:#18241f;--muted:#66736d;--line:#dce4df;--main:#136b50;--soft:#e8f4ef;--hit:#fff1b8;--shadow:0 5px 18px rgba(20,45,35,.07)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:16px;line-height:1.55}
    button,input{font:inherit}button{touch-action:manipulation}.shell{width:min(1060px,100%);margin:auto;padding:20px 16px 96px}
    header{margin-bottom:14px}.brand{font-size:28px;line-height:1.15;margin:0;font-weight:800}.sub{margin:5px 0 0;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}
    .opening{padding:18px;margin-bottom:14px;border-top:5px solid var(--main)}.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.section-title{font-size:20px;margin:0;font-weight:800}
    .primary,.copy,.ghost,.type-btn,.quick-btn{border:0;border-radius:7px;cursor:pointer}.primary{background:var(--main);color:#fff;font-weight:750;padding:12px 16px}.ghost{background:var(--soft);color:var(--main);font-weight:700;padding:9px 12px}.copy{flex:0 0 auto;background:var(--main);color:#fff;min-width:66px;min-height:42px;padding:8px 12px;font-weight:700}
    .lines{display:grid;gap:9px;margin-top:14px}.line{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:7px;padding:11px 11px 11px 14px;background:#fff;transition:background .2s,border-color .2s}.line-text{flex:1;white-space:pre-line}.line.flash{background:var(--hit);border-color:#e8c861}
    .opening.collapsed .lines,.opening.collapsed .primary{display:none}.opening.collapsed{padding:12px 16px}.opening.collapsed .section-title{font-size:17px}
    .search-wrap{margin:14px 0}.search{width:100%;border:1px solid #bcc9c2;background:#fff;border-radius:8px;padding:13px 15px;font-size:17px;outline:none}.search:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(19,107,80,.12)}
    .panel{padding:16px;margin:14px 0}.type-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:13px}.type-btn{min-height:58px;padding:10px;background:#fff;border:1px solid #bfcac4;color:var(--text);font-size:17px;font-weight:750}.type-btn.active{background:var(--main);border-color:var(--main);color:#fff}.type-content{display:none;margin-top:12px;padding-top:3px}.type-content.open{display:block}
    .quick-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin-top:12px}.quick-btn{padding:12px 8px;background:var(--soft);color:#164e3d;border:1px solid #cfe3da;font-weight:700}
    .group{margin:14px 0}.group-toggle{width:100%;border:0;background:transparent;padding:16px;display:flex;justify-content:space-between;align-items:center;text-align:left;color:var(--text);font-weight:800;font-size:19px;cursor:pointer}.group-body{display:none;padding:0 16px 16px}.group.open .group-body{display:block}.chev{color:var(--main);font-size:14px}.group.open .chev::before{content:"收起"}.group:not(.open) .chev::before{content:"展开"}
    .subgroup{margin-top:14px}.subgroup h3{margin:0 0 8px;font-size:17px}.empty{display:none;background:#fff;border:1px dashed #bcc9c2;border-radius:8px;padding:22px;text-align:center;color:var(--muted)}
    footer{text-align:center;color:var(--muted);font-size:13px;margin-top:26px}.bottom{position:fixed;z-index:20;left:50%;bottom:0;transform:translateX(-50%);width:min(1060px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:7px max(8px,env(safe-area-inset-right)) calc(7px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));backdrop-filter:blur(12px)}.bottom a{text-align:center;text-decoration:none;color:#34443d;padding:8px 2px;font-weight:700;font-size:14px}
    .searching .type-grid,.searching .quick-section{display:none}.searching .type-content{display:block}.searching .group{display:block}.searching .group-body{display:block}.hidden{display:none!important}
    @media(max-width:680px){.shell{padding:15px 12px 92px}.brand{font-size:25px}.opening{padding:15px}.section-head{align-items:flex-start}.type-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.quick-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.panel{padding:14px}.line{align-items:flex-start}.line-text{font-size:16px}.copy{min-width:62px}.group-toggle{font-size:18px}.primary{width:100%;margin-top:10px}.opening .section-head{display:block}.opening.collapsed .section-head{display:flex}.opening.collapsed .ghost{margin-left:auto}}
  </style>
</head>
<body>
  <main class="shell" id="top">
    <header><h1 class="brand">新客话术卡</h1><p class="sub">野生菌客服工作台</p></header>

    <section class="card opening" id="opening">
      <div class="section-head"><h2 class="section-title">① 新客统一先发</h2><button class="ghost" id="openingToggle" type="button">收起</button></div>
      <button class="primary" id="copyOpening" type="button">一键复制开场三句</button>
      <div class="lines" id="openingLines"></div>
    </section>

    <div class="search-wrap"><input class="search" id="search" type="search" placeholder="搜索：保存 / 优惠 / 红葱 / 定制 / 加热" autocomplete="off"></div>

    <section class="card panel" id="customers">
      <h2 class="section-title">② 客户回复后，按情况复制</h2>
      <div class="type-grid" id="typeGrid"></div>
      <div id="typeContents"></div>
    </section>

    <section class="card panel quick-section" id="quick">
      <h2 class="section-title">③ 高频快捷</h2>
      <div class="quick-grid" id="quickGrid"></div>
    </section>

    <section class="card group" id="faq">
      <button class="group-toggle" type="button"><span>④ 高频Q&amp;A</span><span class="chev"></span></button>
      <div class="group-body" id="faqBody"></div>
    </section>

    <section class="card group" id="order">
      <button class="group-toggle" type="button"><span>⑤ 推进下单</span><span class="chev"></span></button>
      <div class="group-body" id="orderBody"></div>
    </section>

    <section class="card group" id="after">
      <button class="group-toggle" type="button"><span>⑥ 成交后</span><span class="chev"></span></button>
      <div class="group-body" id="afterBody"></div>
    </section>

    <div class="empty" id="empty">没有找到相关话术</div>
    <footer>版本：新客话术卡 v1.3｜母版同步版</footer>
  </main>
  <nav class="bottom"><a href="#customers">客户类型</a><a href="#faq">常问</a><a href="#order">下单</a><a href="#after">成交后</a></nav>

  <script>
    const data = {
      opening: [
        `朋友！！你好呀`,
        `你是云南人不～吃过见手青嘛？`,
        `需要我根据您的情况给您推荐不～还是您有想吃的野生菌呀？`
      ],
      customers: [
        {key:'A', short:'云南人', title:'A. 云南人', lines:[
          `那就不用我多介绍了哈哈哈！吃见手青就得吃楚雄的。好多老顾客说，我们家的白葱炒得比饭店都好吃，您一定要试试，是我们家的招牌`,
          `好多云南人朋友也找我买，因为自己懒得洗，也怕炒不好就浪费了。特别是干巴菌，每次洗都得洗到凌晨，但是又得当天洗完处理完`,
          `我们家炒菌子炒了七年了，做的都是老顾客回头的生意，货真价实、薄利多销，您尝一次就知道了，顾客的嘴巴不会骗人的`,
          `送人的话，白见手和干巴菌更稳一点。安全、不会闹翻掉，而且到手热一下就能吃，超级方便。`
        ]},
        {key:'B', short:'外地没吃过', title:'B. 外地没吃过', lines:[
          `我们家的见手青主要是有\n1️⃣红见手青，就是会见小人人的那种\n2️⃣白见手青～吃了不会见小人人的安全版见手青`,
          `你要是没吃过见手青，那我建议你先从“白见手青”开始哈～它不像红见手那么猛，但是也超级香，一入口香气就在嘴巴里炸开，我超爱吃的`,
          `我们家的三大招牌：白见手口感香、滑、鲜，我拌饭都能吃三碗！干巴菌想吃香一点的话一定要冲，云南人心目中的菌王，炒饭界的天花板，最难捡也是最好吃的！鸡枞油拿来拌饭超级香，比肉还香，要等过段时间才出。`,
          `我们这边是大厨炒熟了再发的，到你那儿直接锅里一热，加点蒜+小米辣，就能出锅！`
        ]},
        {key:'C', short:'外地人吃过', title:'C. 外地人吃过', lines:[
          `我们有好多外地朋友吃不上正宗的云南菌子都找我们买，也怕自己不会炒浪费了`,
          `我们家主打一个货真价实，薄利多销，菌子都是我哥蹲在楚雄一个山头一个山头去收回来的`,
          `您吃过的话，一定要尝尝我们家的炒好的白见手，好多老顾客说比云南餐馆炒得还好吃`,
          `干巴菌是云南人心目中的菌王，炒饭界的天花板，最难捡也是最好吃的菌子`,
          `白见手、干巴菌、鸡枞油都适合家里吃，拌饭、吃米线都方便。早上拌饭，拌米线，拌面条，煮点小青菜拌一下都巨香。`
        ]}
      ],
      faq: [
        {title:'买红葱 / 想定制', lines:[
          `如果是不吃辣、不吃蒜、不吃猪油，或者有其他别的要求，今年可以做单独定制了，但是要10袋起，每袋300g，师傅单独炒一小锅。`,
          `红葱可以安排，但今年不零售散卖，最少5份起。因为好多外地朋友就是好奇想试试买一两包，如果没经验没热透的话，买回去闹翻了就麻烦了，所以不太建议第一次吃的朋友只因为好奇就买`
        ]},
        {title:'分量/ 性价比', lines:[
          `我们家300g的炒菌是实打实的成品分量，不掺杂菌不掺边角料，吃菌子就是纯吃菌子、只放了一点点蒜片和辣子`,
          `野生菌本身损耗和丢头就大、炒了以后还会再缩水，一公斤菌子洗好炒好也就只剩个四五两。而且最费工费时的是洗菌子处理菌子，特别是洗干巴菌、一洗一个不吱声`,
          `外面干巴菌盖饭都卖到150一碗了，你在我这拿一盒怕是能炒三碗出来！  我真的建议你试试，吃完你就知道这300g是有多扎实`
        ]},
        {title:'安全/售后', lines:[
          `哈哈这个问题90%的人都会问，白见手是安全的，红见手有毒，干巴菌生吃都是可以的。我们家的炒菌子都是大师傅炒熟了再发的，您收到后回家再加热透就能吃。`,
          `稍等我会发食用指南给您，按指南操作就行。等菌子到了一定要放进冰冻哈～不是放冷藏`,
          `一定得用锅加热，不要用微波炉加热。如果实在担心，可以吃之前喝一点牛奶～`
        ]}
      ],
      order: [
        {title:'价格/优惠', lines:[
          `可以先来一两份试试，不用买太多，好吃了再来。任意2件包邮比较划算，一件的话还得付邮费`,
          `我们的优惠活动是满2包邮，满500-40，满1000-100。红葱和私人订制不参与满减`,
          `满500-40，这个是我家最多顾客选的了，2包干巴菌搭1包白葱就到500了。`,
          `今年菌子基本就这个价格了，现在是菌子最多最好的时候，到9月份就落潮了，好多老顾客都已经开始囤货了`
        ]}
      ],
      after: [
        {title:'发货 / 保存 / 反馈', lines:[
          `我们家是每天现炒现发的，今天下单，明天炒好，48小时内顺丰冷链发货。一般是1-2天到，偏远地区3天。`,
          `您收到后尝尝鲜，喜欢吃的话跟我说一声。还请多多推荐新朋友来加我微信买菌子，我给你们都发优惠券`
        ]}
      ]
    };

    const $ = s => document.querySelector(s);
    const lineEl = (text, id='') => {
      const row=document.createElement('div'); row.className='line searchable'; if(id) row.id=id; row.dataset.text=text.toLowerCase();
      const span=document.createElement('div'); span.className='line-text'; span.textContent=text;
      const btn=document.createElement('button'); btn.className='copy'; btn.type='button'; btn.textContent='复制'; btn.addEventListener('click',()=>copyText(text,btn,row));
      row.append(span,btn); return row;
    };
    async function copyText(text,btn,row){
      try{await navigator.clipboard.writeText(text); btn.textContent='已复制'; row.classList.add('flash'); setTimeout(()=>{btn.textContent='复制';row.classList.remove('flash')},1000)}
      catch(e){alert('请手动长按复制')}
    }
    data.opening.forEach((x,i)=>$('#openingLines').append(lineEl(x,'opening-'+i)));
    $('#copyOpening').addEventListener('click',e=>copyText(data.opening.join('\n'),e.currentTarget,$('#opening')));
    $('#openingToggle').addEventListener('click',()=>{const o=$('#opening');o.classList.toggle('collapsed');$('#openingToggle').textContent=o.classList.contains('collapsed')?'开场话术':'收起'});

    data.customers.forEach(c=>{
      const b=document.createElement('button'); b.className='type-btn'; b.type='button'; b.textContent=c.key+' '+c.short; b.dataset.key=c.key; $('#typeGrid').append(b);
      const box=document.createElement('div'); box.className='type-content searchable-block'; box.id='type-'+c.key; box.dataset.text=(c.title+' '+c.lines.join(' ')).toLowerCase();
      const h=document.createElement('h3'); h.textContent=c.title; box.append(h); const ls=document.createElement('div');ls.className='lines';c.lines.forEach(x=>ls.append(lineEl(x)));box.append(ls);$('#typeContents').append(box);
      b.addEventListener('click',()=>openType(c.key));
    });
    function openType(key){document.querySelectorAll('.type-btn').forEach(x=>x.classList.toggle('active',x.dataset.key===key));document.querySelectorAll('.type-content').forEach(x=>x.classList.toggle('open',x.id==='type-'+key));$('#opening').classList.add('collapsed');$('#openingToggle').textContent='开场话术';setTimeout(()=>$('#type-'+key).scrollIntoView({behavior:'smooth',block:'nearest'}),20)}

    function renderGroups(target, groups){groups.forEach((g,gi)=>{const s=document.createElement('section');s.className='subgroup searchable-block';s.dataset.text=(g.title+' '+g.lines.join(' ')).toLowerCase();const h=document.createElement('h3');h.textContent=g.title;s.append(h);const ls=document.createElement('div');ls.className='lines';g.lines.forEach((x,li)=>ls.append(lineEl(x,`${target.id}-${gi}-${li}`)));s.append(ls);target.append(s)})}
    renderGroups($('#faqBody'),data.faq);renderGroups($('#orderBody'),data.order);renderGroups($('#afterBody'),data.after);
    document.querySelectorAll('.group-toggle').forEach(b=>b.addEventListener('click',()=>b.closest('.group').classList.toggle('open')));

    const quicks=[
      ['想定制','faqBody-0-0'],['红葱规则','faqBody-0-1'],['买几份合适','orderBody-0-0'],['能不能优惠','orderBody-0-1'],['分量/性价比','faqBody-1-0'],['怎么保存','faqBody-2-1'],['怎么加热','faqBody-2-2']
    ];
    quicks.forEach(([label,id])=>{const b=document.createElement('button');b.className='quick-btn';b.type='button';b.textContent=label;b.addEventListener('click',()=>{const el=document.getElementById(id);const group=el.closest('.group');group.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1000)});$('#quickGrid').append(b)});

    $('#search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();document.body.classList.toggle('searching',!!q);let found=0;document.querySelectorAll('.searchable').forEach(el=>{const hit=!q||el.dataset.text.includes(q);el.classList.toggle('hidden',!hit);if(q&&hit)found++});document.querySelectorAll('.searchable-block').forEach(el=>{const hit=!q||el.dataset.text.includes(q);el.classList.toggle('hidden',!hit)});document.querySelectorAll('.group').forEach(g=>{if(q)g.classList.add('open')});$('#empty').style.display=q&&!found?'block':'none'});
  </script>
</body>
</html>
