<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>野生菌新客户成交话术卡｜手机客服版</title>
  <style>
    :root {
      --bg: #f6f3ea;
      --card: #fffdfa;
      --text: #172026;
      --muted: #6b7280;
      --line: #e6ded0;
      --green: #236545;
      --green-dark: #174a32;
      --soft: #edf7ef;
      --yellow: #fff4cb;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 18px;
      line-height: 1.55;
      -webkit-text-size-adjust: 100%;
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 243, 234, 0.97);
      backdrop-filter: blur(10px);
      padding: max(12px, env(safe-area-inset-top)) 12px 10px;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 3px 16px rgba(23, 32, 38, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 19px;
      color: var(--green-dark);
      letter-spacing: 0;
    }
    h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    main { padding: 12px 12px 28px; }
    .opening {
      background: var(--card);
      border: 2px solid var(--green);
      border-radius: 14px;
      padding: 12px;
    }
    .jump {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }
    .jump a {
      display: block;
      min-height: 44px;
      padding: 10px 8px;
      border-radius: 12px;
      background: var(--soft);
      color: var(--green-dark);
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      border: 1px solid #d7ebdc;
    }
    .section-title {
      margin: 20px 0 10px;
      font-size: 20px;
      color: var(--green-dark);
    }
    details {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      margin: 10px 0;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(23, 32, 38, 0.04);
      scroll-margin-top: 220px;
    }
    details[open] { border-color: #b7d6bf; }
    summary {
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 14px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      color: var(--green-dark);
      background: #fffaf1;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: "展开";
      margin-left: auto;
      flex: 0 0 auto;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    details[open] summary::after { content: "收起"; }
    .lines { padding: 0 12px 8px; }
    .line {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 10px;
      align-items: stretch;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.55;
    }
    .num {
      color: var(--green-dark);
      font-weight: 900;
      margin-right: 4px;
    }
    .copy {
      appearance: none;
      border: 0;
      border-radius: 12px;
      background: var(--green);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      min-height: 46px;
      padding: 0 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .copy:active { background: var(--green-dark); transform: scale(0.98); }
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .small-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 12px 6px;
    }
    .small-card h3 {
      padding: 12px 0 2px;
      color: var(--green-dark);
    }
    .tip {
      margin: 18px 0 0;
      padding: 12px;
      border-radius: 12px;
      background: var(--yellow);
      color: #5c4616;
      font-size: 15px;
      line-height: 1.45;
      text-align: center;
    }
    @media (min-width: 680px) {
      body { max-width: 720px; margin: 0 auto; }
      .quick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>野生菌新客户成交话术卡｜手机客服版</h1>
    <div class="opening">
      <h2>① 新客统一先发</h2>
      <div id="openingLines"></div>
    </div>
  </div>

  <main>
    <h2 class="section-title">② 客户回复后，按情况点开</h2>
    <div class="jump">
      <a href="#type-a">A 云南人</a>
      <a href="#type-b">B 第一次吃</a>
      <a href="#type-c">C 买不到正宗</a>
      <a href="#type-d">D 想尝鲜</a>
      <a href="#type-e">E 家里吃</a>
      <a href="#type-f">F 送人</a>
      <a href="#type-g">G 想定制</a>
      <a href="#qa">客户常问</a>
    </div>

    <section id="types"></section>

    <h2 class="section-title">③ 按产品快速补一句</h2>
    <section id="products" class="quick-grid"></section>

    <h2 class="section-title" id="qa">④ 客户常问，直接回</h2>
    <section id="qas" class="quick-grid"></section>

    <h2 class="section-title">⑤ 推进下单</h2>
    <section id="push" class="quick-grid"></section>

    <h2 class="section-title">⑥ 成交后</h2>
    <section id="after" class="quick-grid"></section>

    <div class="tip">建议用 Safari / Chrome / Edge 打开，不建议用微信内置预览打开。</div>
  </main>

        '如果你们有不吃辣、不吃蒜、不吃猪油这些要求，可以做单独定制，但是要10份起，每份300g，单独炒一小锅。',

        '能做我再发你下单，不然怕你收到不合适。'
      ]]
    ];

    const products = [
      ['白见手青 / 白葱', [
        '你要是没吃过见手青，那我建议你先从“白见手青”开始哈～一种吃了不会见小人人的安全版见手青。',

      ]],

        '红葱这个今年不零售散卖，最少5份起。这个更适合吃过、懂怎么加热的人，不太建议第一次吃的朋友只因为好奇就买。',

      ]],
      ['干巴菌', [
        '如果想尝试特别一点的一定要试试干巴菌，干巴菌是菌王级别的存在，云南人必吃！',
        '云南人心目中的菌王，炒饭界的天花板，最难捡最好吃的干巴菌。'
      ]],
      ['鸡枞 / 鸡枞油', [
        '鸡枞油拌饭很香。',
        '拌饭神器、香疯了、全屋飘香，开盖香出天灵盖，香晕了。'
      ]],
      ['口味定制', [
        '如果你们有不吃辣、不吃蒜、不吃猪油这些要求，可以做单独定制，但是要10份起，每份300g，单独炒一小锅。',
        '这个可以定制，但不是一两份就能单独炒。一般10份起，每份300g，我先帮你确认这批能不能安排。'
      ]]
    ];

    const qas = [
      ['买几份合适', '先来一份/两份试试，我们满2包邮。'],
      ['安不安全', '我们这边是炒熟了再发的，收到后回家再加热透就能吃。'],

      ['怎么保存', '收货马上放冷冻，家里一定要有人收快递，顺丰1-2天，偏远地区3天马上到。'],
      ['能不能优惠', '我们满2包邮，满500-40，专门定的团货优惠。'],
      ['会不会再降价', '因为到了9月就没了，好多老顾客开始囤货了。'],
      ['能不能不辣/不蒜/不用猪油', '这个可以定制，但不是一两份就能单独炒。一般10份起，每份300g，我先帮你确认这批能不能安排。'],
      ['红葱能不能买一两份尝尝', '红葱今年不散卖，最少5份起，这个更适合吃过、懂怎么加热的人；第一次吃的话我一般建议先从白见手青开始。'],
      ['有哪些菌子可以买', '白见手、干巴菌、鸡枞油都可以看，红葱最少5份起。']
    ];

    const push = [
      ['发链接', '我发你看看哈。'],
      ['客户没反应', '您是送人还是自己吃呀？'],
      ['推荐2份', '先来一份/两份试试，我们满2包邮。'],
      ['推荐4份', '满500-40，专门定的团货优惠。'],
      ['客户说考虑一下', '因为到了9月就没了，好多老顾客开始囤货了。'],
      ['当天批次有限', '今晚下单，明天炒好，48小时内顺丰冷链发货。'],
      ['红葱5份起提醒', '红葱可以安排，但这个不是新客随便尝鲜款，最少5份起，收到后一定要彻底热透再吃。'],
      ['定制10份起提醒', '这个可以定制，但不是一两份就能单独炒。一般10份起，每份300g，我先帮你确认这批能不能安排。']
    ];

    const after = [
      ['下单感谢', '收到您的订单啦～我们今天洗好炒好，明天顺丰冷链发货。'],
      ['保存提醒', '收货马上放冷冻，家里一定要有人收快递，顺丰1-2天，偏远地区3天马上到。'],
      ['到货反馈', '你收到后尝尝看，喜欢的话跟我说一声。']
    ];

    function line(text, i) {
      const row = document.createElement('div');
      row.className = 'line';
      const content = document.createElement('div');
      content.className = 'text';
      if (i) {
        const num = document.createElement('span');
        num.className = 'num';
        num.textContent = i + '.';
        content.append(num, document.createTextNode(text));
      } else {
        content.textContent = text;
      }
      const button = document.createElement('button');
      button.className = 'copy';
      button.type = 'button';
      button.textContent = '复制';
      button.dataset.copy = text;
      row.append(content, button);
      return row;
    }

    function renderLines(el, lines) {
      lines.forEach((text, idx) => el.appendChild(line(text, idx + 1)));
    }

    function renderDetails(container, items, openFirst) {
      items.forEach(([id, title, lines], index) => {
        const details = document.createElement('details');
        details.id = id;
        if (openFirst && index === 0) details.open = true;
        const summary = document.createElement('summary');
        summary.textContent = title;
        const wrap = document.createElement('div');
        wrap.className = 'lines';
        renderLines(wrap, lines);
        details.append(summary, wrap);
        container.appendChild(details);
      });
    }

    function renderSmall(container, items) {
      items.forEach(([title, lines]) => {
        const card = document.createElement('div');
        card.className = 'small-card';
        const h = document.createElement('h3');
        h.textContent = title;
        card.appendChild(h);
        (Array.isArray(lines) ? lines : [lines]).forEach((text) => card.appendChild(line(text)));
        container.appendChild(card);
      });
    }

    async function copyText(text, button) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (err) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const old = button.textContent;
      button.textContent = '已复制';
      setTimeout(() => { button.textContent = old; }, 1000);
    }

    renderLines(document.getElementById('openingLines'), opening);
    renderDetails(document.getElementById('types'), types, true);
    renderSmall(document.getElementById('products'), products);
    renderSmall(document.getElementById('qas'), qas);
    renderSmall(document.getElementById('push'), push);
    renderSmall(document.getElementById('after'), after);

    document.addEventListener('click', (event) => {
      const button = event.target.closest('button.copy');
      if (button) copyText(button.dataset.copy, button);
    });
  </script>
</body>
</html>
