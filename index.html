<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17684f">
  <title>野生菌新客户成交话术卡｜多产品极简最终版</title>
  <style>
    :root{--bg:#f5f7f5;--card:#fff;--text:#17231e;--muted:#65736c;--line:#d9e2dd;--main:#17684f;--soft:#e9f3ee;--hit:#fff1a8;--shadow:0 3px 12px rgba(25,50,40,.06)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font:15.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}button,input{font:inherit}button{touch-action:manipulation;cursor:pointer}
    .shell{max-width:1180px;margin:auto;padding:6px 8px 30px}.brand{font-size:16px;line-height:1.15;margin:0 0 5px;font-weight:850;color:#1d2b24}
    .search{width:100%;border:1px solid #b8c7c0;border-radius:8px;background:#fff;padding:7px 9px;font-size:14.5px;outline:none;margin:6px 0 4px}.search:focus{border-color:var(--main);box-shadow:0 0 0 3px rgba(23,104,79,.12)}
    .section{margin-top:7px}.card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.module-head,.subhead{display:flex;align-items:center;justify-content:space-between;gap:7px;padding:7px 9px;border-bottom:1px solid var(--line);user-select:none}.clickable-head{cursor:pointer}.clickable-head:hover{background:#f2f7f4}.module-title{margin:0;font-size:16px;font-weight:850}.head-meta{display:flex;align-items:center;color:var(--main);font-weight:850;white-space:nowrap}.chev{font-size:16px;line-height:1}.module-body{padding:7px 8px}.collapsed>.module-body{display:none}.collapsed>.module-head{border-bottom:0}
    .opening{border-top:3px solid var(--main)}.lines{display:grid;gap:5px}.line{position:relative;display:flex;align-items:flex-start;gap:6px;border:1px solid var(--line);border-radius:7px;background:#fff;padding:6px 6px 6px 8px;transition:background .2s,border-color .2s}.line-text{flex:1;white-space:pre-line;word-break:break-word;min-width:0}.copy{flex:0 0 auto;border:0;border-radius:7px;background:var(--main);color:#fff;font-weight:800;min-width:46px;min-height:30px;padding:4px 7px;font-size:13.5px}.line.flash{background:var(--hit);border-color:#dfbf32}
    .grid-customers{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.grid-qa{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.subcard{background:#fbfcfb;border:1px solid var(--line);border-radius:8px;overflow:hidden;min-width:0}.subhead h3{font-size:15px;line-height:1.2;margin:0}.subbody{padding:6px 7px}.subcard.collapsed .subbody{display:none}.subcard.collapsed .subhead{border-bottom:0}.title-stack{min-width:0}
    .empty{display:none;text-align:center;color:var(--muted);background:#fff;border:1px dashed #b9c7c0;border-radius:9px;padding:16px;margin:10px 0}.hidden{display:none!important}
    @media(max-width:980px){.grid-customers,.grid-qa{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:650px){body{font-size:14.5px}.shell{padding:5px 7px 26px}.brand{font-size:15.5px;margin-bottom:4px}.module-head,.subhead{padding:7px 8px}.module-title{font-size:15.5px}.module-body{padding:6px 7px}.grid-customers,.grid-qa{grid-template-columns:1fr}.line{gap:6px;padding:6px 6px 6px 7px}.copy{min-width:45px;min-height:30px}.subhead h3{font-size:14.5px}}
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="brand">销售话术卡</h1>

    <section class="card section opening" id="opening">
      <div class="module-head clickable-head" role="button" tabindex="0"><h2 class="module-title">开场三句话</h2><span class="head-meta"><span class="chev">⌄</span></span></div>
      <div class="module-body"><div class="lines" id="openingLines"></div></div>
    </section>

    <input class="search" id="search" type="search" placeholder="搜索：保存 / 优惠 / 红葱 / 定制 / 加热" autocomplete="off">

    <section class="card section" id="customers">
      <div class="module-head clickable-head" role="button" tabindex="0"><h2 class="module-title">客户类型</h2><span class="head-meta"><span class="chev">⌄</span></span></div>
      <div class="module-body"><div class="grid-customers" id="customerCards"></div></div>
    </section>

    <section class="card section" id="qa">
      <div class="module-head clickable-head" role="button" tabindex="0"><h2 class="module-title">高频 Q&amp;A</h2><span class="head-meta"><span class="chev">⌄</span></span></div>
      <div class="module-body"><div class="grid-qa" id="qaGroups"></div></div>
    </section>

    <div class="empty" id="empty">没有找到相关话术</div>
  </main>

    const $=s=>document.querySelector(s);
    const $$=s=>Array.from(document.querySelectorAll(s));

    function searchableText(parts){return parts.join(' ').toLowerCase()}
    async function copyText(text,btn,row){try{await navigator.clipboard.writeText(text);btn.textContent='已复制';row.classList.add('flash');setTimeout(()=>{btn.textContent='复制';row.classList.remove('flash')},1000)}catch(e){alert('请手动长按复制')}}
    function makeLine(text){const row=document.createElement('div');row.className='line searchable';row.dataset.text=text.toLowerCase();const content=document.createElement('div');content.className='line-text';content.textContent=text;const btn=document.createElement('button');btn.type='button';btn.className='copy';btn.textContent='复制';btn.addEventListener('click',()=>copyText(text,btn,row));row.append(content,btn);return row}
    function setHeadState(head, arrow){const c=head&&head.querySelector('.chev');if(c)c.textContent=arrow}
    function setModuleCollapsed(module, collapsed){module.classList.toggle('collapsed', collapsed);const head=module.querySelector(':scope > .module-head');setHeadState(head, collapsed?'›':'⌄')}
    function toggleModule(module){setModuleCollapsed(module,!module.classList.contains('collapsed'))}
    function renderLines(container, lines){container.innerHTML='';lines.forEach(x=>container.append(makeLine(x)))}
    function bindHeadToggle(head, action){head.addEventListener('click',action);head.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();action()}})}

    function makeCustomerCard(c){const card=document.createElement('section');card.className='subcard searchable-block customer-block collapsed';card.dataset.text=searchableText([c.title,...c.lines]);const head=document.createElement('div');head.className='subhead clickable-head';head.setAttribute('role','button');head.tabIndex=0;const left=document.createElement('div');left.className='title-stack';const h=document.createElement('h3');h.textContent=c.title;left.append(h);const meta=document.createElement('span');meta.className='head-meta';meta.innerHTML='<span class="chev">›</span>';head.append(left,meta);const body=document.createElement('div');body.className='subbody';const lines=document.createElement('div');lines.className='lines';renderLines(lines,c.lines);body.append(lines);card.append(head,body);
      function collapse(){card.classList.add('collapsed');setHeadState(head,'›')}
      function expand(){card.classList.remove('collapsed');setHeadState(head,'⌄')}
      bindHeadToggle(head,()=>{card.classList.contains('collapsed')?expand():collapse()});
      card._collapse=collapse;card._expand=expand;return card}

    function makeQaCard(g){const card=document.createElement('section');card.className='subcard searchable-block qa-block collapsed';card.dataset.text=searchableText([g.title,...g.lines]);const head=document.createElement('div');head.className='subhead clickable-head';head.setAttribute('role','button');head.tabIndex=0;const left=document.createElement('div');left.className='title-stack';const h=document.createElement('h3');h.textContent=`${g.title}（${g.lines.length}）`;left.append(h);const meta=document.createElement('span');meta.className='head-meta';meta.innerHTML='<span class="chev">›</span>';head.append(left,meta);const body=document.createElement('div');body.className='subbody';const lines=document.createElement('div');lines.className='lines';renderLines(lines,g.lines);body.append(lines);card.append(head,body);
      function collapse(){card.classList.add('collapsed');setHeadState(head,'›')}
      function expand(){card.classList.remove('collapsed');setHeadState(head,'⌄')}
      bindHeadToggle(head,()=>{card.classList.contains('collapsed')?expand():collapse()});
      card._collapse=collapse;card._expand=expand;return card}

    function defaultState(){setModuleCollapsed($('#opening'),false);setModuleCollapsed($('#customers'),false);setModuleCollapsed($('#qa'),false);$$('.customer-block').forEach(card=>card._collapse&&card._collapse());$$('.qa-block').forEach(card=>card._collapse&&card._collapse());$$('.searchable,.searchable-block,.section').forEach(el=>el.classList.remove('hidden'));$('#empty').style.display='none'}
    function build(){renderLines($('#openingLines'), data.opening);data.customers.forEach(c=>$('#customerCards').append(makeCustomerCard(c)));data.qa.forEach(g=>$('#qaGroups').append(makeQaCard(g)));defaultState()}
    function runSearch(q){const query=q.trim().toLowerCase();if(!query){defaultState();return}setModuleCollapsed($('#customers'),false);setModuleCollapsed($('#qa'),false);let found=0;$$('.searchable').forEach(el=>{const hit=el.dataset.text.includes(query);el.classList.toggle('hidden',!hit);if(hit)found++});$$('.searchable-block').forEach(el=>{const hit=el.dataset.text.includes(query);el.classList.toggle('hidden',!hit);if(hit){found++;if(el._expand)el._expand()}});$('#empty').style.display=found?'none':'block'}

    build();
    $$('.section>.module-head.clickable-head').forEach(head=>bindHeadToggle(head,()=>toggleModule(head.closest('.section'))));
    $('#search').addEventListener('input',e=>runSearch(e.target.value));
  </script>
</body>
</html>
